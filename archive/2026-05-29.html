<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DAiLYSIS Pulse | Secure brief</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0f1714;
      --panel: rgba(249, 248, 243, 0.96);
      --ink: #10201a;
      --muted: #56645d;
      --accent: #1f7a63;
      --accent-dark: #115744;
      --danger: #8c2b2b;
      font-family: "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 20%, rgba(31, 122, 99, 0.35), transparent 30%),
        radial-gradient(circle at 85% 0%, rgba(158, 196, 174, 0.22), transparent 28%),
        linear-gradient(180deg, #10201a 0%, var(--bg) 100%);
      color: #eff5f1;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .shell {
      width: min(960px, 100%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.30);
      overflow: hidden;
    }
    .header {
      padding: 28px 28px 16px;
    }
    .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      opacity: 0.72;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.04;
    }
    .lede {
      margin: 14px 0 0;
      color: rgba(239, 245, 241, 0.86);
      max-width: 620px;
      line-height: 1.6;
    }
    form {
      margin: 0;
      padding: 18px 28px 28px;
      display: grid;
      gap: 14px;
    }
    label {
      font-size: 14px;
      color: rgba(239, 245, 241, 0.88);
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    input {
      flex: 1 1 320px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.10);
      color: #fff;
      font-size: 16px;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.44);
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #f7fbf9;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }
    .status {
      min-height: 20px;
      font-size: 14px;
      color: rgba(239, 245, 241, 0.84);
    }
    .status.error {
      color: #ffd7d7;
    }
    iframe {
      width: 100%;
      min-height: 100vh;
      border: 0;
      background: #fff;
      display: none;
    }
    .note {
      padding: 0 28px 28px;
      color: rgba(239, 245, 241, 0.68);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="eyebrow">DAiLYSIS Pulse</div>
      <h1>Secure daily brief</h1>
      <p class="lede">Enter your private passphrase to decrypt the 2026-05-29 brief in your browser. The published page contains encrypted content only.</p>
    </div>
    <form id="unlock-form">
      <label for="passphrase">Passphrase</label>
      <div class="row">
        <input id="passphrase" name="passphrase" type="password" autocomplete="current-password" placeholder="Enter your passphrase" required>
        <button id="unlock-button" type="submit">Unlock brief</button>
      </div>
      <div id="status" class="status"></div>
    </form>
    <div class="note">If the passphrase is wrong, the page cannot be decrypted. Nothing is sent to a server during unlock.</div>
    <iframe id="brief-frame" title="Decrypted brief"></iframe>
  </div>

    const form = document.getElementById("unlock-form");
    const button = document.getElementById("unlock-button");
    const field = document.getElementById("passphrase");
    const status = document.getElementById("status");
    const frame = document.getElementById("brief-frame");

    function decodeBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    async function deriveKey(passphrase) {
      const baseKey = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(passphrase),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          hash: "SHA-256",
          iterations: payload.iterations,
          salt: decodeBase64(payload.salt)
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(passphrase) {
      const key = await deriveKey(passphrase);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: decodeBase64(payload.iv) },
        key,
        decodeBase64(payload.ciphertext)
      );
      return new TextDecoder().decode(decrypted);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.classList.remove("error");
      status.textContent = "Decrypting brief...";
      button.disabled = true;
      try {
        const htmlDocument = await unlock(field.value);
        frame.srcdoc = htmlDocument;
        frame.style.display = "block";
        form.style.display = "none";
        document.querySelector(".note").style.display = "none";
        status.textContent = "";
      } catch (error) {
        status.textContent = "Incorrect passphrase or corrupted payload.";
        status.classList.add("error");
      } finally {
        button.disabled = false;
      }
    });
  </script>
