<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DAiLYSIS Pulse | Secure brief</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --line: #374151;
      --text: #ffffff;
      --muted: #6b7280;
      --blue: #3b82f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .shell {
      width: min(420px, 100%);
    }
    .eyebrow {
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      line-height: 1.2;
    }
    form {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #1f2937;
      color: #ffffff;
      font-size: 16px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 12px;
      background: var(--blue);
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
    }
    button:disabled {
      opacity: 0.75;
    }
    .status {
      min-height: 18px;
      font-size: 14px;
      color: #fca5a5;
    }
    iframe {
      width: 100%;
      min-height: 100vh;
      border: 0;
      background: #fff;
      display: none;
    }
  </style>
</head>

    </form>
    <iframe id="brief-frame" title="Decrypted brief"></iframe>
  </div>

    const form = document.getElementById("unlock-form");
    const button = document.getElementById("unlock-button");
    const field = document.getElementById("passphrase");
    const status = document.getElementById("status");
    const frame = document.getElementById("brief-frame");

    function decodeBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    async function deriveKey(passphrase) {
      const baseKey = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(passphrase),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          hash: "SHA-256",
          iterations: payload.iterations,
          salt: decodeBase64(payload.salt)
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(passphrase) {
      const key = await deriveKey(passphrase);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: decodeBase64(payload.iv) },
        key,
        decodeBase64(payload.ciphertext)
      );
      return new TextDecoder().decode(decrypted);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.textContent = "";
      button.disabled = true;
      try {
        const htmlDocument = await unlock(field.value);
        frame.srcdoc = htmlDocument;
        frame.style.display = "block";
        form.style.display = "none";
      } catch (error) {
        status.textContent = "Incorrect passphrase.";
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
